baseURL: "https://DrewLeetw.github.io/ai-news-daily/"
title: "AI News Daily"
theme: PaperMod

# Default language is 繁體中文
defaultContentLanguage: zh-tw
defaultContentLanguageInSubdir: false

# Pagination
paginate: 10

# Enable emoji, robots, feeds
enableRobotsTXT: true

# Markup
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    enabled: true

# Outputs
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Params
params:
  env: production
  description: "每日 AI 新聞摘要 — 由 Hermes 自動整理（繁體中文 / English）"
  author: "Drew Lee"
  DateFormat: "2006-01-02"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  disableSpecial1stPost: true
  mainSections:
    - posts
  assets:
    favicon: /favicon.ico

# Multi-language
languages:
  zh-tw:
    label: "繁體中文"
    languageName: "繁體中文"
    weight: 1
    params:
      profileMode:
        enabled: true
        title: "每日 AI 新聞"
        subtitle: "由 Hermes 整理的每日 AI 新聞摘要"
    menu:
      main:
        - identifier: home
          name: 首頁
          url: /
          weight: 1
        - identifier: archives
          name: 彙整
          url: /zh-tw/archives/
          weight: 2
        - identifier: about
          name: 關於
          url: /zh-tw/about/
          weight: 3

  en:
    label: "English"
    languageName: "English"
    weight: 2
    params:
      profileMode:
        enabled: true
        title: "AI News Daily"
        subtitle: "Daily AI news digest — curated by Hermes"
    menu:
      main:
        - identifier: home
          name: Home
          url: /en/
          weight: 1
        - identifier: archives
          name: Archive
          url: /en/archives/
          weight: 2
        - identifier: about
          name: About
          url: /en/about/
          weight: 3
